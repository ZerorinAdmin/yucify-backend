# Repto backend - deploy with: fly deploy (from repo root)
# Set secrets: fly secrets set BACKEND_SECRET=xxx ADSPY_FACEBOOK_PROFILE=...

app = "repto-backend"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
